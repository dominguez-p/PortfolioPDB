<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Retail Client Solutions Control Tower</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <div id="app" class="app-shell">
    <aside class="sidebar">
      <div class="brand">BBVA</div>
      <div class="tower-mark">⌂</div>
      <div class="side-title">Control<br />Tower</div>
      <button class="home-link" data-route="landing">Inicio</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="breadcrumb">Retail Client Solutions</p>
          <h1 id="pageTitle">Control Tower</h1>
          <p id="pageSubtitle" class="subtitle">Portfolio overview, demanda estratégica y evolución de arquitectura</p>
        </div>
        <div class="data-status">
          <span class="dot"></span>

          <span id="dataStatus">Cargando datos…</span>

          <button id="refreshDataBtn" class="data-source-btn" type="button">
            Actualizar datos
          </button>

          <button id="openDataSourceBtn" class="data-source-btn secondary" type="button">
            Abrir origen
          </button>
        </div>
      </header>

      <section id="view"></section>
    </main>
  </div>

  <template id="landing-template">
    <section class="kpi-strip" id="portfolioKpis"></section>
    <section class="section-title-row">
      <h2>Programas RCS</h2>
      <p>Vista ejecutiva de avance funcional, sistemas y arquitectura.</p>
    </section>
    <section class="program-grid" id="programGrid"></section>
  </template>

  <template id="program-template">
    <section class="program-hero">
      <div>
        <button class="ghost-button" data-route="landing">← Volver</button>
        <h2 id="programName"></h2>
        <p id="programDescription"></p>
      </div>
      <div class="hero-metrics" id="programMetrics"></div>
    </section>
    <section class="module-grid" id="moduleGrid"></section>

  </template>

  <template id="functional-template">
    <button class="ghost-button back-to-program-btn" data-route="">
      ← Volver al programa
    </button>
    <section class="section-title-row">
      <h2>Mapa de capacidades funcionales</h2>
      <p>Dominios, capacidades y funcionalidades de AIxBanker.</p>
    </section>
    <section class="functional-map" id="functionalMap"></section>
  </template>

  <template id="systems-template">
    <button class="ghost-button back-to-program-btn" data-route="">
      ← Volver al programa
    </button>

    <section class="section-title-row">
      <h2>Mapa de sistemas</h2>
      <p>Vista combinada de sistemas, inventario y capacidades funcionales.</p>
    </section>


    <section class="systems-dashboard-grid systems-two-columns" id="systemsDashboardGrid">
      <article class="panel systems-map-panel">
        <h3>Mapa de sistemas</h3>
        <button class="expand-map-btn" type="button" id="expandSystemMapBtn">
          Expandir mapa
        </button>

        <div class="system-map-canvas" id="systemMapCanvas">
          <svg class="system-links-svg" id="systemLinksSvg"></svg>
          <section class="system-layers" id="systemLayers"></section>
        </div>
      </article>

      <article class="panel systems-functional-panel">
        <h3>Mapa funcional</h3>
        <section class="systems-mini-functional-map" id="systemsFunctionalMap"></section>
      </article>
    </section>
  </template>
  <template id="impediments-template">
    <button class="ghost-button back-to-program-btn" data-route="">
      ← Volver al programa
    </button>

    <section class="section-title-row">
      <h2>Impedimentos</h2>
      <p>Bloqueos, riesgos y mitigaciones activas.</p>
    </section>

    <section id="impedimentsList" class="management-list"></section>
  </template>

  <template id="decisions-template">
    <button class="ghost-button back-to-program-btn" data-route="">
      ← Volver al programa
    </button>

    <section class="section-title-row">
      <h2>Decisiones</h2>
      <p>Decisiones pendientes y decisiones ya tomadas.</p>
    </section>

    <section class="two-column">
      <article class="panel">
        <h3>Decisiones pendientes</h3>
        <div id="decisionsPendingList" class="management-list"></div>
      </article>

      <article class="panel">
        <h3>Decisiones tomadas</h3>
        <div id="decisionsDoneList" class="management-list"></div>
      </article>
    </section>
  </template>
  <template id="architecture-template">
    <button class="ghost-button back-to-program-btn" data-route="">
      ← Volver al programa
    </button>

    <section class="section-title-row">
      <h2>Arquitectura de referencia</h2>
      <p>Vista target de arquitectura, features, gaps y dependencias.</p>
    </section>

    <section class="systems-dashboard-grid" id="systemsDashboardGrid">
      <article class="panel systems-map-panel">
        <h3>Mapa de sistemas As-Is</h3>
        <button class="expand-map-btn" type="button" id="expandSystemMapBtn">
          Expandir mapa
        </button>

        <div class="system-map-canvas" id="systemMapCanvas">
          <svg class="system-links-svg" id="systemLinksSvg"></svg>
          <section class="system-layers" id="systemLayers"></section>
        </div>
      </article>

      <article class="panel">
        <h3>Features, gaps y dependencias</h3>
        <div class="table-wrap">
          <table id="systemsTable"></table>
        </div>
      </article>

      <article class="panel systems-functional-panel">
        <article class="panel systems-tobe-panel">
          <h3>Mapa de sistemas To-Be</h3>
          <button class="expand-map-btn" type="button" id="expandToBeMapBtn">
            Expandir mapa
          </button>
          <div class="system-map-canvas" id="systemMapCanvasToBe">
            <svg class="system-links-svg" id="systemLinksSvgToBe"></svg>
            <section class="system-layers" id="systemLayersToBe"></section>
          </div>
        </article>
    </section>
  </template>

  <script src="js/config.js"></script>
  <script src="js/sample-data.js"></script>
  <script src="js/google-sheets.js"></script>
  <script src="js/app.js"></script>
  <footer class="footer">
    © Pablo Domínguez 2026
  </footer>
</body>

</html>
